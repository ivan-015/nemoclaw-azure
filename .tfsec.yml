# tfsec — Terraform security scanner configuration.
# Run via: `tfsec .` from the repo root.
# Phase 8 task T054 enforces zero unjustified findings before the v1 PR.
#
# Per-resource exceptions live as inline `# tfsec:ignore:RULE_ID`
# comments above the offending block, with the rationale in the
# comment body. Search the tree for `tfsec:ignore` to audit:
#
#   $ rg 'tfsec:ignore' terraform/
#
# This file remains intentionally empty so the canonical exception
# trail is the code review of the inline comments, not a YAML file
# that can drift from the resources it covers.

exclude: []
